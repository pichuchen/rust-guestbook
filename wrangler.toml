name = "rust-guestbook"
main = "build/worker/shim.mjs"
compatibility_date = "2024-03-01"

[build]
command = "cargo install -q worker-build@^0.8 && worker-build --release"

# ── D1 Database ──────────────────────────────────────────────────────────────
# Set DB_DATABASE_NAME and DB_DATABASE_ID as environment variables (or GitHub
# secrets for CI/CD) before deploying.  For local dev: export both variables.
[[d1_databases]]
binding       = "DB"
database_name = "${DB_DATABASE_NAME}"
database_id   = "${DB_DATABASE_ID}"

# ── R2 Bucket ────────────────────────────────────────────────────────────────
# Run `wrangler r2 bucket create guestbook-attachments` first.
[[r2_buckets]]
binding     = "ATTACHMENTS"
bucket_name = "guestbook-attachments"

# ── Environment variables ─────────────────────────────────────────────────────
[vars]
ADMIN_USERNAME = "admin"    # change to your desired admin username

# ── Secrets (set via CLI, NOT stored in this file) ────────────────────────────
# wrangler secret put ADMIN_PASSWORD   →  your admin login password
# wrangler secret put JWT_SECRET       →  any long random string (e.g. `openssl rand -hex 32`)

# ── observability ─────────────────────────────────────────────────────────────
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
