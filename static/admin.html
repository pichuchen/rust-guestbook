<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>後台管理 · Rust Guestbook</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ── Login Page ──────────────────────────────────────────────────────── -->
  <div id="loginPage" class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
      <div class="text-center mb-6">
        <span class="text-4xl">🔐</span>
        <h1 class="text-2xl font-bold text-gray-800 mt-2">後台管理</h1>
        <p class="text-gray-500 text-sm mt-1">請登入以管理留言</p>
      </div>
      <form id="loginForm" novalidate>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-600 mb-1">使用者名稱</label>
          <input id="loginUser" type="text" required autocomplete="username"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent"
            placeholder="admin" />
        </div>
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-600 mb-1">密碼</label>
          <input id="loginPass" type="password" required autocomplete="current-password"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent"
            placeholder="••••••••" />
        </div>
        <div id="loginError" class="hidden text-red-500 text-sm mb-4 p-3 bg-red-50 rounded-lg"></div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white py-2.5 rounded-lg font-semibold text-sm transition-colors">
          登入
        </button>
      </form>
    </div>
  </div>

  <!-- ── Admin Dashboard ────────────────────────────────────────────────── -->
  <div id="dashboard" class="hidden max-w-5xl mx-auto px-4 py-10">

    <!-- Top bar -->
    <header class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-extrabold text-indigo-700">📋 留言管理後台</h1>
        <p class="text-gray-400 text-sm mt-0.5">審核、管理所有留言</p>
      </div>
      <div class="flex items-center gap-3">
        <a href="/" class="text-sm text-indigo-500 hover:text-indigo-700 transition-colors">← 前台留言板</a>
        <button id="logoutBtn"
          class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
          登出
        </button>
      </div>
    </header>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 text-center">
        <p id="statTotal"   class="text-3xl font-bold text-indigo-600">–</p>
        <p class="text-gray-500 text-xs mt-1">總留言數</p>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 text-center">
        <p id="statPending" class="text-3xl font-bold text-yellow-500">–</p>
        <p class="text-gray-500 text-xs mt-1">待審核</p>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 text-center">
        <p id="statApproved" class="text-3xl font-bold text-green-500">–</p>
        <p class="text-gray-500 text-xs mt-1">已通過</p>
      </div>
    </div>

    <!-- Filter tabs -->
    <div class="flex gap-2 mb-5" id="filterTabs">
      <button data-filter="all"
        class="tab-btn px-4 py-2 rounded-full text-sm font-medium bg-indigo-600 text-white transition-colors">
        全部
      </button>
      <button data-filter="pending"
        class="tab-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-500 border border-gray-200 hover:bg-gray-50 transition-colors">
        待審核
      </button>
      <button data-filter="approved"
        class="tab-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-500 border border-gray-200 hover:bg-gray-50 transition-colors">
        已通過
      </button>
    </div>

    <!-- Toast notification -->
    <div id="toast"
      class="hidden fixed bottom-6 right-6 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-xl text-sm z-50 transition-all">
    </div>

    <!-- Message list -->
    <div id="msgList" class="space-y-4">
      <div class="text-center text-gray-400 py-10 text-sm">載入中…</div>
    </div>
  </div>

  <script>
    const API = '';

    // ── State ────────────────────────────────────────────────────────────────
    let token       = localStorage.getItem('adminToken');
    let allMessages = [];
    let filter      = 'all';

    // ── Helpers ──────────────────────────────────────────────────────────────
    function esc(t) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(t ?? ''));
      return d.innerHTML;
    }

    function fmtDate(s) {
      if (!s) return '';
      try {
        return new Date(s.includes('T') || s.includes('+') ? s : s + 'Z')
          .toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      } catch { return s; }
    }

    function toast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `fixed bottom-6 right-6 ${isError ? 'bg-red-600' : 'bg-gray-900'} text-white px-5 py-3 rounded-xl shadow-xl text-sm z-50`;
      el.classList.remove('hidden');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.add('hidden'), 3000);
    }

    // ── Auth ─────────────────────────────────────────────────────────────────
    function showLogin()     { document.getElementById('loginPage').classList.remove('hidden'); document.getElementById('dashboard').classList.add('hidden'); }
    function showDashboard() { document.getElementById('loginPage').classList.add('hidden');    document.getElementById('dashboard').classList.remove('hidden'); }

    if (token) showDashboard();

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl  = document.getElementById('loginError');
      const btn    = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      errEl.classList.add('hidden');

      try {
        const res  = await fetch(`${API}/api/admin/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            username: document.getElementById('loginUser').value,
            password: document.getElementById('loginPass').value,
          }),
        });
        const data = await res.json();
        if (data.success && data.data?.token) {
          token = data.data.token;
          localStorage.setItem('adminToken', token);
          showDashboard();
          loadMessages();
        } else {
          errEl.textContent = data.error || '登入失敗，請檢查帳號密碼。';
          errEl.classList.remove('hidden');
        }
      } catch {
        errEl.textContent = '無法連接到伺服器，請稍後再試。';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('adminToken');
      token = null;
      allMessages = [];
      showLogin();
    });

    // ── Filter tabs ───────────────────────────────────────────────────────────
    document.getElementById('filterTabs').addEventListener('click', e => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      filter = btn.dataset.filter;
      document.querySelectorAll('.tab-btn').forEach(b => {
        const active = b.dataset.filter === filter;
        b.className = active
          ? 'tab-btn px-4 py-2 rounded-full text-sm font-medium bg-indigo-600 text-white transition-colors'
          : 'tab-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-500 border border-gray-200 hover:bg-gray-50 transition-colors';
      });
      render();
    });

    // ── Load messages ─────────────────────────────────────────────────────────
    async function loadMessages() {
      try {
        const res = await fetch(`${API}/api/admin/messages`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.status === 401) { localStorage.removeItem('adminToken'); location.reload(); return; }
        const data = await res.json();
        if (data.success) {
          allMessages = data.data ?? [];
          updateStats();
          render();
        }
      } catch {
        document.getElementById('msgList').innerHTML =
          '<div class="text-center text-red-400 py-10 text-sm">載入失敗，請重新整理頁面。</div>';
      }
    }

    // ── Stats ─────────────────────────────────────────────────────────────────
    function updateStats() {
      const approved = allMessages.filter(m => m.approved).length;
      document.getElementById('statTotal').textContent    = allMessages.length;
      document.getElementById('statPending').textContent  = allMessages.length - approved;
      document.getElementById('statApproved').textContent = approved;
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render() {
      const msgs = filter === 'all'      ? allMessages
                 : filter === 'pending'  ? allMessages.filter(m => !m.approved)
                 : allMessages.filter(m => m.approved);

      const list = document.getElementById('msgList');
      if (msgs.length === 0) {
        list.innerHTML = '<div class="text-center text-gray-400 py-10 text-sm">沒有符合條件的留言。</div>';
        return;
      }

      list.innerHTML = msgs.map(m => `
        <article class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5" id="card-${m.id}">
          <div class="flex items-start justify-between gap-2">
            <div class="flex items-center gap-2 min-w-0">
              <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 font-semibold text-sm shrink-0">
                ${esc(m.name.charAt(0).toUpperCase())}
              </span>
              <div class="min-w-0">
                <span class="font-semibold text-gray-800 text-sm">${esc(m.name)}</span>
                ${m.email ? `<span class="text-gray-400 text-xs ml-1">&lt;${esc(m.email)}&gt;</span>` : ''}
              </div>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              <span class="px-2.5 py-0.5 rounded-full text-xs font-medium ${m.approved
                ? 'bg-green-100 text-green-700'
                : 'bg-yellow-100 text-yellow-700'}">
                ${m.approved ? '✓ 已通過' : '⏳ 待審核'}
              </span>
              <time class="text-xs text-gray-400">${fmtDate(m.created_at)}</time>
            </div>
          </div>

          <p class="mt-3 text-gray-700 text-sm leading-relaxed whitespace-pre-wrap">${esc(m.content)}</p>

          ${m.attachment_key ? `
          <div class="mt-2 flex items-center gap-1.5">
            <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
            </svg>
            <a href="${API}/api/attachments/${encodeURIComponent(m.attachment_key)}" target="_blank" rel="noopener"
              class="text-indigo-500 hover:text-indigo-700 text-xs font-medium hover:underline">查看附件</a>
          </div>` : ''}

          <div class="mt-4 flex gap-2">
            ${!m.approved ? `
            <button onclick="approveMsg(${m.id})"
              class="bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 px-4 py-1.5 rounded-lg text-xs font-semibold transition-colors">
              ✓ 通過審核
            </button>` : ''}
            <button onclick="deleteMsg(${m.id})"
              class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-4 py-1.5 rounded-lg text-xs font-semibold transition-colors">
              🗑 刪除
            </button>
          </div>
        </article>
      `).join('');
    }

    // ── Actions ───────────────────────────────────────────────────────────────
    async function approveMsg(id) {
      try {
        const res = await fetch(`${API}/api/admin/messages/${id}/approve`, {
          method:  'PUT',
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) throw new Error();
        const m = allMessages.find(x => x.id === id);
        if (m) m.approved = true;
        updateStats();
        render();
        toast('✓ 留言已通過審核');
      } catch {
        toast('操作失敗，請重試。', true);
      }
    }

    async function deleteMsg(id) {
      if (!confirm('確定要刪除這則留言嗎？')) return;
      try {
        const res = await fetch(`${API}/api/admin/messages/${id}`, {
          method:  'DELETE',
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) throw new Error();
        allMessages = allMessages.filter(x => x.id !== id);
        updateStats();
        render();
        toast('留言已刪除');
      } catch {
        toast('操作失敗，請重試。', true);
      }
    }

    // ── Initial load ──────────────────────────────────────────────────────────
    if (token) loadMessages();
  </script>
</body>
</html>
