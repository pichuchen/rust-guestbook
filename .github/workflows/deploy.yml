name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --target wasm32-unknown-unknown

      - name: Substitute environment variables in wrangler.toml
        run: envsubst '$DB_DATABASE_NAME $DB_DATABASE_ID' < wrangler.toml > wrangler.toml.tmp && mv wrangler.toml.tmp wrangler.toml
        env:
          DB_DATABASE_NAME: ${{ secrets.DB_DATABASE_NAME }}
          DB_DATABASE_ID: ${{ secrets.DB_DATABASE_ID }}

      - name: Apply D1 schema migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: d1 execute ${{ secrets.DB_DATABASE_NAME }} --remote --yes --file=schema.sql

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy
